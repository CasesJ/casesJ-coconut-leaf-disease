<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 Live Detection Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .video-feed {
            width: 100%;
            height: auto;
            display: block;
            max-height: 600px;
        }

        .stream-placeholder {
            width: 100%;
            height: 600px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 16px;
        }

        /* Status overlay */
        .status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 10;
        }

        .status-overlay.inactive {
            color: #ff6b6b;
        }

        .status-overlay.stopped {
            color: #ffa94d;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .sidebar h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .stats-item {
            margin-bottom: 15px;
        }

        .stats-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stats-value {
            color: #667eea;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .stats-value.warning {
            color: #ffa94d;
        }

        .stats-value.error {
            color: #ff6b6b;
        }

        /* Controls */
        .controls {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
        }

        .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Settings */
        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        input[type="range"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
        }

        /* Detections list */
        .detections-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .detections-panel h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .detection-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .detection-class {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .detection-confidence {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 8px;
        }

        .no-detections {
            color: #999;
            text-align: center;
            padding: 30px 10px;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                height: auto;
            }

            .controls {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                gap: 10px;
            }

            header {
                padding: 15px;
            }

            header h1 {
                font-size: 20px;
            }

            .sidebar {
                grid-template-columns: 1fr;
            }

            .video-feed {
                max-height: 400px;
            }

            .stream-placeholder {
                height: 400px;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stream-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }

        .stream-status.active {
            background: #d4edda;
            color: #155724;
        }

        .stream-status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 Live Coconut Disease Detection Stream</h1>
            <p>Real-time detection powered by OpenVINO | User: {{ user_email }}</p>
        </header>

        <div class="main-content">
            <!-- Video Feed -->
            <div class="video-container">
                <div id="videoFeed" class="stream-placeholder">
                    <span id="streamStatus">Click "Start Stream" to begin</span>
                </div>
                <img id="streamImage" class="video-feed" style="display:none;" />
                <div id="statusOverlay" class="status-overlay stopped">
                    Stream: <span id="streamState">Stopped</span>
                </div>
            </div>

            <!-- Sidebar with Stats -->
            <div class="sidebar">
                <h2>📊 Statistics</h2>

                <div class="stats-item">
                    <div class="stats-label">FPS</div>
                    <div class="stats-value" id="fps">0.0</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Inference Time</div>
                    <div class="stats-value" id="inferenceTime">0 ms</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Current Detections</div>
                    <div class="stats-value" id="detectionCount">0</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Frames Processed</div>
                    <div class="stats-value" id="frameCount">0</div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startStream()">
                        ▶️ Start Stream
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopStream()" disabled>
                        ⏹️ Stop Stream
                    </button>
                </div>

                <div class="settings">
                    <h3 style="margin-bottom: 10px; color: #333; font-size: 14px;">⚙️ Settings</h3>

                    <div class="setting-group">
                        <label class="setting-label">Confidence Threshold</label>
                        <input
                            type="range"
                            id="confidenceSlider"
                            min="0"
                            max="100"
                            value="50"
                            step="5"
                        />
                        <div style="text-align: center; color: #667eea; font-size: 12px; margin-top: 5px;">
                            <span id="confidenceValue">50</span>%
                        </div>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">Video Source</label>
                        <select id="videoSource">
                            <option value="0">📷 Webcam (Default)</option>
                            <option value="1">📹 USB Camera</option>
                            <option value="rtsp://192.168.1.100:554/stream1">🚁 Drone RTSP</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detections Panel -->
        <div class="detections-panel">
            <h2>🎯 Current Detections</h2>
            <div id="detectionsList"></div>
        </div>
    </div>

    <script>
        // 🎥 Streaming State
        let isStreaming = false;
        let statsUpdateInterval = null;
        let streamUpdateInterval = null;

        // 📊 Update statistics from server
        async function updateStats() {
            try {
                const response = await fetch('/stream/stats');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                if (data.status === 'success') {
                    const stats = data.data;
                    document.getElementById('fps').textContent = stats.fps.toFixed(1);
                    document.getElementById('inferenceTime').textContent = `${stats.inference_ms.toFixed(0)} ms`;
                    document.getElementById('detectionCount').textContent = stats.detections;
                    document.getElementById('frameCount').textContent = stats.frame_number;
                }
            } catch (error) {
                console.error('❌ Stats update error:', error);
            }
        }

        // 🎯 Update detections list
        async function updateDetections() {
            try {
                const response = await fetch('/stream/detections');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                if (data.status === 'success' && data.detections.length > 0) {
                    renderDetections(data.detections);
                } else {
                    document.getElementById('detectionsList').innerHTML =
                        '<div class="no-detections">No detections at the moment</div>';
                }
            } catch (error) {
                console.error('❌ Detections update error:', error);
            }
        }

        // 🎨 Render detections list
        function renderDetections(detections) {
            const html = detections.map(det => `
                <div class="detection-item">
                    <span class="detection-class">${det.class || 'Unknown'}</span>
                    <span class="detection-confidence">
                        ${(det.confidence * 100).toFixed(1)}%
                    </span>
                </div>
            `).join('');

            document.getElementById('detectionsList').innerHTML = html;
        }

        // ▶️ Start streaming
        async function startStream() {
            try {
                const source = document.getElementById('videoSource').value;
                const confidence = parseInt(document.getElementById('confidenceSlider').value);

                const response = await fetch('/stream/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, confidence })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                isStreaming = true;

                // Update UI
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('streamState').textContent = 'Active';
                document.getElementById('statusOverlay').classList.remove('stopped');
                document.getElementById('statusOverlay').classList.add('inactive');

                // Show video feed
                const videoFeed = document.getElementById('streamImage');
                videoFeed.src = `/stream/video?source=${source}&confidence=${confidence}`;
                videoFeed.style.display = 'block';
                document.getElementById('videoFeed').style.display = 'none';

                // Start polling stats
                if (!statsUpdateInterval) {
                    statsUpdateInterval = setInterval(() => {
                        updateStats();
                        updateDetections();
                    }, 500);
                }

                console.log('✅ Stream started');
            } catch (error) {
                console.error('❌ Start stream error:', error);
                alert('Failed to start stream: ' + error.message);
            }
        }

        // ⏹️ Stop streaming
        async function stopStream() {
            try {
                const response = await fetch('/stream/stop', { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                isStreaming = false;

                // Update UI
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('streamState').textContent = 'Stopped';
                document.getElementById('statusOverlay').classList.add('stopped');
                document.getElementById('statusOverlay').classList.remove('inactive');

                // Hide video feed
                document.getElementById('streamImage').style.display = 'none';
                document.getElementById('videoFeed').style.display = 'flex';
                document.getElementById('streamStatus').textContent = 'Stream stopped';

                // Stop polling
                if (statsUpdateInterval) {
                    clearInterval(statsUpdateInterval);
                    statsUpdateInterval = null;
                }

                console.log('✅ Stream stopped');
            } catch (error) {
                console.error('❌ Stop stream error:', error);
                alert('Failed to stop stream: ' + error.message);
            }
        }

        // 🎚️ Confidence slider
        document.getElementById('confidenceSlider').addEventListener('input', (e) => {
            document.getElementById('confidenceValue').textContent = e.target.value;
        });

        // ⌨️ Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isStreaming) stopStream();
                else startStream();
            }
        });

        // 🔄 Initial state
        updateStats();
        updateDetections();
    </script>
</body>
</html>
