<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥 Live Detection Stream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --deep:#0b2a1f; --mid:#164d37; --bright:#26865a; --accent:#3ec97a;
            --pale:#d0eddf; --cream:#f5f2eb; --cream2:#ebe7dd; --sand:#c4b49a;
            --text:#0e1c15; --text2:#3a5244; --text3:#7a9a8a; --white:#ffffff;
            --red:#e04f4f; --red-bg:#fde8e8; --red-text:#8b2020;
            --yellow:#f0b429; --yellow-bg:#fef8e7; --yellow-text:#7a4f00;
            --r:14px; --rs:10px;
            --sh:0 2px 12px rgba(11,42,31,0.09); --shm:0 8px 32px rgba(11,42,31,0.13);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 24px;
        }

        @media (max-width: 1024px) {
            .container { padding: 20px; }
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
        }

        @media (max-width: 640px) {
            .container { padding: 12px; }
        }

        header {
            background: rgba(245, 242, 235, 0.95);
            backdrop-filter: blur(14px);
            padding: 20px 24px;
            border-radius: var(--r);
            margin-bottom: 20px;
            box-shadow: var(--sh);
            border: 1px solid rgba(11, 42, 31, 0.08);
        }

        @media (max-width: 768px) {
            header { padding: 16px 20px; margin-bottom: 16px; }
        }

        @media (max-width: 640px) {
            header { padding: 14px 16px; margin-bottom: 14px; }
        }

        header h1 {
            color: var(--deep);
            margin-bottom: 6px;
            font-size: 26px;
            font-family: 'DM Serif Display', serif;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 22px; }
        }

        @media (max-width: 640px) {
            header h1 { font-size: 18px; }
        }

        header p {
            color: var(--text3);
            font-size: 13px;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            header p { font-size: 12px; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1000px) {
            .main-content { grid-template-columns: 1fr 280px; gap: 16px; }
        }

        @media (max-width: 860px) {
            .main-content { grid-template-columns: 1fr; gap: 14px; }
        }

        @media (max-width: 640px) {
            .main-content { gap: 12px; margin-bottom: 16px; }
        }

        .video-container {
            background: var(--white);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--sh);
            position: relative;
            border: 1px solid rgba(11, 42, 31, 0.06);
            min-height: 350px;
        }

        @media (max-width: 768px) {
            .video-container { min-height: 300px; }
        }

        @media (max-width: 640px) {
            .video-container { min-height: 250px; }
        }

        .video-feed {
            width: 100%;
            height: auto;
            display: block;
            max-height: 600px;
        }

        @media (max-width: 768px) {
            .video-feed { max-height: 400px; }
        }

        @media (max-width: 640px) {
            .video-feed { max-height: 280px; }
        }

        .stream-placeholder {
            width: 100%;
            height: 600px;
            background: var(--deep);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stream-placeholder { height: 400px; font-size: 13px; }
        }

        @media (max-width: 640px) {
            .stream-placeholder { height: 280px; font-size: 12px; }
        }

        /* Status overlay */
        .status-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(11, 42, 31, 0.85);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 14px;
            border-radius: 6px;
            font-family: 'DM Sans', monospace;
            font-size: 12px;
            z-index: 10;
            border: 1px solid rgba(62, 201, 122, 0.3);
        }

        @media (max-width: 640px) {
            .status-overlay { font-size: 11px; padding: 6px 12px; top: 8px; left: 8px; }
        }

        .status-overlay.inactive {
            color: rgba(62, 201, 122, 0.9);
            border-color: rgba(62, 201, 122, 0.5);
        }

        .status-overlay.stopped {
            color: rgba(224, 79, 79, 0.8);
            border-color: rgba(224, 79, 79, 0.3);
        }

        /* Sidebar */
        .sidebar {
            background: var(--white);
            border-radius: var(--r);
            padding: 20px;
            box-shadow: var(--sh);
            border: 1px solid rgba(11, 42, 31, 0.06);
            height: fit-content;
        }

        @media (max-width: 1000px) {
            .sidebar { padding: 16px; }
        }

        @media (max-width: 860px) {
            .sidebar {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                height: auto;
            }
        }

        @media (max-width: 640px) {
            .sidebar {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 12px;
            }
        }

        .sidebar h2 {
            color: var(--deep);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .sidebar h2 { font-size: 12px; margin-bottom: 12px; }
        }

        .stats-item {
            margin-bottom: 14px;
        }

        @media (max-width: 640px) {
            .stats-item { margin-bottom: 10px; }
        }

        .stats-label {
            color: var(--text3);
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .stats-label { font-size: 9px; }
        }

        .stats-value {
            color: var(--bright);
            font-size: 18px;
            font-weight: 600;
            font-family: 'DM Serif Display', serif;
        }

        @media (max-width: 768px) {
            .stats-value { font-size: 16px; }
        }

        @media (max-width: 640px) {
            .stats-value { font-size: 14px; }
        }

        .stats-value.warning {
            color: var(--yellow);
        }

        .stats-value.error {
            color: var(--red);
        }

        /* Controls */
        .controls {
            display: grid;
            gap: 8px;
            margin-top: 16px;
        }

        @media (max-width: 860px) {
            .controls {
                grid-column: 1 / -1;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
        }

        @media (max-width: 640px) {
            .controls {
                grid-column: auto;
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        .btn {
            padding: 11px 18px;
            border: none;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .btn { padding: 10px 14px; font-size: 11px; }
        }

        @media (max-width: 640px) {
            .btn { padding: 9px 12px; font-size: 10px; }
        }

        .btn-primary {
            background: var(--deep);
            color: white;
            box-shadow: 0 2px 8px rgba(11, 42, 31, 0.1);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--mid);
            box-shadow: 0 4px 12px rgba(11, 42, 31, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--red-bg);
            color: var(--red-text);
            border: 1.5px solid rgba(139, 32, 32, 0.2);
        }

        .btn-danger:hover:not(:disabled) {
            background: #fcd5d5;
            box-shadow: 0 2px 8px rgba(224, 79, 79, 0.2);
            transform: translateY(-1px);
        }

        .btn-danger:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Settings */
        .settings {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(11, 42, 31, 0.08);
        }

        @media (max-width: 860px) {
            .settings {
                grid-column: 1 / -1;
            }
        }

        .setting-group {
            margin-bottom: 14px;
        }

        @media (max-width: 640px) {
            .setting-group { margin-bottom: 10px; }
        }

        .setting-label {
            color: var(--text2);
            font-size: 10px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .setting-label { font-size: 9px; }
        }

        input[type="range"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid rgba(11, 42, 31, 0.12);
            border-radius: var(--rs);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: var(--white);
            transition: border-color 0.2s;
        }

        @media (max-width: 640px) {
            input[type="range"],
            input[type="number"],
            select {
                font-size: 11px;
                padding: 7px 10px;
            }
        }

        input[type="range"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--bright);
            box-shadow: 0 0 0 3px rgba(38, 134, 90, 0.1);
        }

        input[type="range"] {
            padding: 0;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bright);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(11, 42, 31, 0.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bright);
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(11, 42, 31, 0.2);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            background: rgba(11, 42, 31, 0.12);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-track {
            background: rgba(11, 42, 31, 0.12);
            height: 4px;
            border-radius: 2px;
            border: none;
        }

        /* Detections list */
        .detections-panel {
            background: var(--white);
            border-radius: var(--r);
            padding: 20px;
            box-shadow: var(--sh);
            border: 1px solid rgba(11, 42, 31, 0.06);
        }

        @media (max-width: 768px) {
            .detections-panel { padding: 16px; }
        }

        @media (max-width: 640px) {
            .detections-panel { padding: 14px; }
        }

        .detections-panel h2 {
            color: var(--deep);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .detections-panel h2 { font-size: 12px; margin-bottom: 12px; }
        }

        .detection-item {
            background: rgba(245, 242, 235, 0.5);
            padding: 12px;
            border-radius: var(--rs);
            margin-bottom: 8px;
            border-left: 3px solid var(--bright);
            display: flex;
            align-items:center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .detection-item { padding: 10px; margin-bottom: 6px; }
        }

        @media (max-width: 640px) {
            .detection-item { padding: 9px; margin-bottom: 5px; }
        }

        .detection-class {
            font-weight: 600;
            color: var(--text);
            font-size: 12px;
            text-transform: capitalize;
        }

        @media (max-width: 640px) {
            .detection-class { font-size: 11px; }
        }

        .detection-confidence {
            display: inline-block;
            background: var(--pale);
            color: var(--mid);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .detection-confidence { font-size: 10px; padding: 2px 8px; }
        }

        .no-detections {
            color: var(--text3);
            text-align: center;
            padding: 40px 20px;
            font-size: 13px;
            border-radius: var(--rs);
            background: rgba(245, 242, 235, 0.5);
        }

        @media (max-width: 640px) {
            .no-detections { padding: 30px 15px; font-size: 12px; }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                height: auto;
            }

            .controls {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            header h1 { font-size: 20px; }
            .sidebar { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            header h1 { font-size: 16px; }
            .detections-panel { margin-top: 16px; }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(11, 42, 31, 0.1);
            border-radius: 50%;
            border-top-color: var(--bright);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stream-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(11, 42, 31, 0.05);
            border-radius: var(--rs);
            font-size: 11px;
            color: var(--text3);
            border: 1px solid rgba(11, 42, 31, 0.08);
        }

        @media (max-width: 640px) {
            .stream-status { font-size: 10px; padding: 6px 10px; }
        }

        .stream-status.active {
            background: rgba(62, 201, 122, 0.1);
            color: var(--bright);
            border-color: rgba(62, 201, 122, 0.2);
        }

        .stream-status.error {
            background: var(--red-bg);
            color: var(--red-text);
            border-color: rgba(224, 79, 79, 0.2);
        }

        .confidence-display {
            text-align: center;
            color: var(--bright);
            font-size: 11px;
            margin-top: 6px;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .confidence-display { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 Live Coconut Disease Detection Stream</h1>
            <p>Real-time detection powered by OpenVINO | User: {{ user_email }}</p>
        </header>

        <div class="main-content">
            <!-- Video Feed -->
            <div class="video-container">
                <div id="videoFeed" class="stream-placeholder">
                    <span id="streamStatus">Click "Start Stream" to begin</span>
                </div>
                <img id="streamImage" class="video-feed" style="display:none;" />
                <div id="statusOverlay" class="status-overlay stopped">
                    Stream: <span id="streamState">Stopped</span>
                </div>
            </div>

            <!-- Sidebar with Stats -->
            <div class="sidebar">
                <h2>📊 Statistics</h2>

                <div class="stats-item">
                    <div class="stats-label">FPS</div>
                    <div class="stats-value" id="fps">0.0</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Inference Time</div>
                    <div class="stats-value" id="inferenceTime">0 ms</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Current Detections</div>
                    <div class="stats-value" id="detectionCount">0</div>
                </div>

                <div class="stats-item">
                    <div class="stats-label">Frames Processed</div>
                    <div class="stats-value" id="frameCount">0</div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startStream()">
                        ▶️ Start Stream
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopStream()" disabled>
                        ⏹️ Stop Stream
                    </button>
                </div>

                <div class="settings">
                    <h3 style="margin-bottom: 10px; color: #333; font-size: 14px;">⚙️ Settings</h3>

                    <div class="setting-group">
                        <label class="setting-label">Confidence Threshold</label>
                        <input
                            type="range"
                            id="confidenceSlider"
                            min="0"
                            max="100"
                            value="50"
                            step="5"
                        />
                        <div class="confidence-display">
                            <span id="confidenceValue">50</span>%
                        </div>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">Video Source</label>
                        <select id="videoSource">
                            <option value="0">📷 Webcam (Default)</option>
                            <option value="1">📹 USB Camera</option>
                            <option value="rtsp://192.168.1.100:554/stream1">🚁 Drone RTSP</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detections Panel -->
        <div class="detections-panel">
            <h2>🎯 Current Detections</h2>
            <div id="detectionsList"></div>
        </div>
    </div>

    <script>
        // 🎥 Streaming State
        let isStreaming = false;
        let statsUpdateInterval = null;
        let streamUpdateInterval = null;

        // 📊 Update statistics from server
        async function updateStats() {
            try {
                const response = await fetch('/stream/stats');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                if (data.status === 'success') {
                    const stats = data.data;
                    document.getElementById('fps').textContent = stats.fps.toFixed(1);
                    document.getElementById('inferenceTime').textContent = `${stats.inference_ms.toFixed(0)} ms`;
                    document.getElementById('detectionCount').textContent = stats.detections;
                    document.getElementById('frameCount').textContent = stats.frame_number;
                }
            } catch (error) {
                console.error('❌ Stats update error:', error);
            }
        }

        // 🎯 Update detections list
        async function updateDetections() {
            try {
                const response = await fetch('/stream/detections');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                if (data.status === 'success' && data.detections.length > 0) {
                    renderDetections(data.detections);
                } else {
                    document.getElementById('detectionsList').innerHTML =
                        '<div class="no-detections">No detections at the moment</div>';
                }
            } catch (error) {
                console.error('❌ Detections update error:', error);
            }
        }

        // 🎨 Render detections list
        function renderDetections(detections) {
            const html = detections.map(det => `
                <div class="detection-item">
                    <span class="detection-class">${det.class || 'Unknown'}</span>
                    <span class="detection-confidence">
                        ${(det.confidence * 100).toFixed(1)}%
                    </span>
                </div>
            `).join('');

            document.getElementById('detectionsList').innerHTML = html;
        }

        // ▶️ Start streaming
        async function startStream() {
            try {
                const source = document.getElementById('videoSource').value;
                const confidence = parseInt(document.getElementById('confidenceSlider').value);

                const response = await fetch('/stream/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, confidence })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                isStreaming = true;

                // Update UI
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('streamState').textContent = 'Active';
                document.getElementById('statusOverlay').classList.remove('stopped');
                document.getElementById('statusOverlay').classList.add('inactive');

                // Show video feed
                const videoFeed = document.getElementById('streamImage');
                videoFeed.src = `/stream/video?source=${source}&confidence=${confidence}`;
                videoFeed.style.display = 'block';
                document.getElementById('videoFeed').style.display = 'none';

                // Start polling stats
                if (!statsUpdateInterval) {
                    statsUpdateInterval = setInterval(() => {
                        updateStats();
                        updateDetections();
                    }, 500);
                }

                console.log('✅ Stream started');
            } catch (error) {
                console.error('❌ Start stream error:', error);
                alert('Failed to start stream: ' + error.message);
            }
        }

        // ⏹️ Stop streaming
        async function stopStream() {
            try {
                const response = await fetch('/stream/stop', { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                isStreaming = false;

                // Update UI
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('streamState').textContent = 'Stopped';
                document.getElementById('statusOverlay').classList.add('stopped');
                document.getElementById('statusOverlay').classList.remove('inactive');

                // Hide video feed
                document.getElementById('streamImage').style.display = 'none';
                document.getElementById('videoFeed').style.display = 'flex';
                document.getElementById('streamStatus').textContent = 'Stream stopped';

                // Stop polling
                if (statsUpdateInterval) {
                    clearInterval(statsUpdateInterval);
                    statsUpdateInterval = null;
                }

                console.log('✅ Stream stopped');
            } catch (error) {
                console.error('❌ Stop stream error:', error);
                alert('Failed to stop stream: ' + error.message);
            }
        }

        // 🎚️ Confidence slider
        document.getElementById('confidenceSlider').addEventListener('input', (e) => {
            document.getElementById('confidenceValue').textContent = e.target.value;
        });

        // ⌨️ Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isStreaming) stopStream();
                else startStream();
            }
        });

        // 🔄 Initial state
        updateStats();
        updateDetections();
    </script>
</body>
</html>
